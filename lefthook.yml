pre-commit:
  parallel: true
  jobs:
    - name: oxfmt
      glob: '*.{js,ts,json,jsonc,css,md,yml,yaml,html}'
      run: ./node_modules/.bin/oxfmt --write {staged_files}
      stage_fixed: true
    - name: prettier
      glob: '*.svelte'
      run: ./node_modules/.bin/prettier --write --cache --cache-location node_modules/.cache/prettier-cache {staged_files}
      stage_fixed: true
    - name: eslint
      glob: '*.{js,ts,svelte}'
      run: ./node_modules/.bin/eslint --fix {staged_files}
      stage_fixed: true
    - name: typecheck
      glob: '*.{ts,svelte}'
      run: cd projs/ffoni && ../../node_modules/.bin/tsc --noEmit
    - name: comment-length
      glob: '*.{ts,tsx,js,jsx,mjs,cjs,svelte,css,scss,html}'
      run: ./scripts/check-comment-length.sh {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: ./node_modules/.bin/commitlint --edit {1}

# Per-project build, gated by glob — only the projs/<name> touched in the
# pushed commits gets built. Runs in parallel so multi-project pushes don't
# serialize. Catches runtime-only failures that pre-commit can't see: CSS
# import chain, vite build, a11y_* warnings, wrangler type drift, prerender
# violations.
pre-push:
  parallel: true
  jobs:
    - name: build-ffoni
      glob: 'projs/ffoni/**/*'
      run: bun --filter ffoni build
    - name: build-api
      glob: 'projs/api/**/*'
      run: bun --filter api build
    - name: build-dash
      glob: 'projs/dash/**/*'
      run: bun --filter dash build
