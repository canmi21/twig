pre-commit:
  parallel: true
  jobs:
    - name: prettier
      glob: '*.{js,ts,svelte,json,jsonc,css,md,yml,yaml,html}'
      run: bunx prettier --write {staged_files}
      stage_fixed: true
    - name: eslint
      glob: '*.{js,ts,svelte}'
      run: bunx eslint --fix {staged_files}
      stage_fixed: true

commit-msg:
  jobs:
    - name: commitlint
      run: bunx --no -- commitlint --edit {1}
